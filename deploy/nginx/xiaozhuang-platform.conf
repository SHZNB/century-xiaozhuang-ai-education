# 百年晓庄智慧教育平台 Nginx 反向代理模板
# 使用前替换 server_name、证书路径，并确认 upstream 指向 Node 服务端或 Docker Compose 暴露端口。

upstream xiaozhuang_platform_node {
    server 127.0.0.1:8080;
    keepalive 32;
}

server {
    listen 80;
    server_name ai-xiaozhuang.example.edu.cn;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name ai-xiaozhuang.example.edu.cn;

    ssl_certificate /etc/letsencrypt/live/ai-xiaozhuang.example.edu.cn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ai-xiaozhuang.example.edu.cn/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:XiaozhuangSSL:10m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    client_max_body_size 30m;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
    proxy_connect_timeout 30s;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location / {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_pass http://xiaozhuang_platform_node;
    }

    location = /api/health {
        access_log off;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_pass http://xiaozhuang_platform_node;
    }
}

map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}
