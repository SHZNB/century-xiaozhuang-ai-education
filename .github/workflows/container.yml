name: Verify and publish server container

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: container
  cancel-in-progress: true

jobs:
  container:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: npm install
      - run: npm run check:env
      - run: npm run check:workflow-env
      - run: npm run check:deploy
      - run: docker compose config
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: xiaozhuang-platform:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - run: docker image inspect xiaozhuang-platform:test
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: server-container-handoff
          path: |
            Dockerfile
            compose.yml
            .env.production.example
            deploy/nginx/xiaozhuang-platform.conf
            deploy/systemd/xiaozhuang-platform.service
            deploy/systemd/xiaozhuang-platform-backup.service
            deploy/systemd/xiaozhuang-platform-backup.timer
            deploy/monitoring/prometheus.yml
            deploy/monitoring/xiaozhuang-platform-alerts.yml
            docs/DEPLOYMENT.md
            docs/DISASTER_RECOVERY.md
            docs/WORKFLOW_ENVIRONMENT.md

  publish:
    if: github.event_name != 'pull_request'
    needs: container
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - id: image
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}/century-xiaozhuang-server" >> "$GITHUB_OUTPUT"
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
