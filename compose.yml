services:
  xiaozhuang-platform:
    build: .
    ports:
      - "8080:8080"
    env_file:
      - path: .env
        required: false
    environment:
      NODE_ENV: production
      DATA_DIR: /data
    volumes:
      - xiaozhuang-data:/data
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8080/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped

volumes:
  xiaozhuang-data:
